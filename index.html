<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Modern Ball - Team Wheel Draft</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #121212;
            color: #e0e0e0;
            max-width: 800px;
            margin: 40px auto;
            padding: 20px;
        }
        h1, h2, h3 { color: #ff9800; text-align: center; }
        .card {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            border: 1px solid #333;
            margin-bottom: 20px;
        }
        .team-banner {
            font-size: 24px;
            font-weight: bold;
            color: #2196f3;
            text-align: center;
            margin-bottom: 15px;
            text-transform: uppercase;
        }
        .pool-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        .player-btn {
            background-color: #2c2c2c;
            color: #fff;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 5px;
            cursor: pointer;
            width: 160px;
            text-align: center;
        }
        .player-btn:hover { background-color: #ff9800; color: #000; }
        .roster-list { 
            display: flex; 
            flex-wrap: wrap;
            gap: 10px; 
            justify-content: center; 
            margin-top: 10px; 
        }
        .roster-slot { 
            background: #333; 
            padding: 10px; 
            border-radius: 5px; 
            width: 150px; 
            text-align: center;
            font-size: 14px;
            border: 1px dashed #555;
        }
        button.action-btn {
            display: block;
            width: 220px;
            margin: 20px auto;
            padding: 12px;
            background-color: #4caf50;
            color: white;
            border: none;
            font-size: 16px;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
        }
        button.action-btn:hover { background-color: #45a049; }
        button.action-btn:disabled { background-color: #555; cursor: not-allowed; }
        #results { font-size: 18px; line-height: 1.6; }
        .win { color: #4caf50; font-weight: bold; }
        .loss { color: #f44336; font-weight: bold; }
    </style>
</head>
<body>

    <h1>Modern Ball Simulator</h1>
    
    <div class="card" id="draft-section">
        <h2>Draft Your 8-Man Roster (<span id="count">0</span>/8)</h2>
        <hr style="border-color: #333; margin: 15px 0;">
        
        <div id="draft-ui">
            <div class="team-banner" id="current-team-name">Loading Team...</div>
            <div class="pool-container" id="player-pool"></div>
        </div>
        
        <h3>Your Current Roster:</h3>
        <div class="roster-list" id="my-roster">
            </div>
        
        <button class="action-btn" id="sim-btn" onclick="startSimulation()" disabled>Simulate 82-Game Season</button>
    </div>

    <div class="card" id="results-section" style="display:none;">
        <h2>Season Results</h2>
        <div id="results"></div>
        <button class="action-btn" onclick="resetGame()">Play Again</button>
    </div>

<script>
// 1. Database grouped strictly by teams
const nbaTeams = [
    {
        teamName: "Celtics",
        players: [
            { name: "Jayson Tatum", off: 93, def: 90 },
            { name: "Jaylen Brown", off: 90, def: 88 },
            { name: "Derrick White", off: 85, def: 89 },
            { name: "Kristaps Porzingis", off: 86, def: 85 }
        ]
    },
    {
        teamName: "Mavericks",
        players: [
            { name: "Luka Doncic", off: 99, def: 82 },
            { name: "Kyrie Irving", off: 92, def: 78 },
            { name: "Klay Thompson", off: 82, def: 78 },
            { name: "Dereck Lively II", off: 78, def: 85 }
        ]
    },
    {
        teamName: "Nuggets",
        players: [
            { name: "Nikola Jokic", off: 98, def: 90 },
            { name: "Jamal Murray", off: 87, def: 79 },
            { name: "Aaron Gordon", off: 82, def: 86 },
            { name: "Michael Porter Jr.", off: 84, def: 77 }
        ]
    },
    {
        teamName: "Thunder",
        players: [
            { name: "Shai Gilgeous-A.", off: 95, def: 91 },
            { name: "Chet Holmgren", off: 85, def: 92 },
            { name: "Jalen Williams", off: 88, def: 86 },
            { name: "Alex Caruso", off: 78, def: 93 }
        ]
    },
    {
        teamName: "Spurs",
        players: [
            { name: "Victor Wembanyama", off: 89, def: 99 },
            { name: "Chris Paul", off: 80, def: 81 },
            { name: "Devin Vassell", off: 84, def: 79 },
            { name: "Jeremy Sochan", off: 77, def: 84 }
        ]
    },
    {
        teamName: "Timberwolves",
        players: [
            { name: "Anthony Edwards", off: 92, def: 88 },
            { name: "Julius Randle", off: 86, def: 76 },
            { name: "Rudy Gobert", off: 70, def: 94 },
            { name: "Naz Reid", off: 83, def: 79 }
        ]
    },
    {
        teamName: "Lakers",
        players: [
            { name: "LeBron James", off: 92, def: 82 },
            { name: "Anthony Davis", off: 90, def: 95 },
            { name: "Austin Reaves", off: 83, def: 77 },
            { name: "D'Angelo Russell", off: 82, def: 72 }
        ]
    },
    {
        teamName: "Bucks",
        players: [
            { name: "Giannis Antet.", off: 94, def: 95 },
            { name: "Damian Lillard", off: 91, def: 75 },
            { name: "Khris Middleton", off: 82, def: 79 },
            { name: "Brook Lopez", off: 76, def: 86 }
        ]
    }
];

let selectedRoster = [];
const maxRosterSize = 8;

// 2. Setup Blank Roster Grid UI
function buildEmptySlots() {
    const rosterDiv = document.getElementById("my-roster");
    rosterDiv.innerHTML = "";
    for (let i = 0; i < maxRosterSize; i++) {
        const slot = document.createElement("div");
        slot.className = "roster-slot";
        slot.innerText = `Slot ${i + 1}: —`;
        rosterDiv.appendChild(slot);
    }
}

// 3. Generate a brand new random team loop
function nextRandomTeam() {
    // If the roster is complete, shut down the card inputs
    if (selectedRoster.length >= maxRosterSize) {
        document.getElementById("current-team-name").innerText = "Draft Complete!";
        document.getElementById("player-pool").innerHTML = "";
        document.getElementById("sim-btn").disabled = false;
        return;
    }

    // Pick a random team from our array index
    const randomIndex = Math.floor(Math.random() * nbaTeams.length);
    const chosenTeam = nbaTeams[randomIndex];

    // Show team title banner
    document.getElementById("current-team-name").innerText = `Team: ${chosenTeam.teamName}`;

    // Clear old options and inject the selected team's roster options
    const poolDiv = document.getElementById("player-pool");
    poolDiv.innerHTML = "";

    chosenTeam.players.forEach(player => {
        const btn = document.createElement("button");
        btn.className = "player-btn";
        btn.innerHTML = `<strong>${player.name}</strong><br>OFF: ${player.off} | DEF: ${player.def}`;
        btn.onclick = () => selectPlayer(player);
        poolDiv.appendChild(btn);
    });
}

// 4. Record selected player and progress the phase forward
function selectPlayer(player) {
    if (selectedRoster.length < maxRosterSize) {
        selectedRoster.push(player);
        updateRosterUI();
        nextRandomTeam(); // Force roll the next team immediately
    }
}

function updateRosterUI() {
    document.getElementById("count").innerText = selectedRoster.length;
    const slots = document.getElementById("my-roster").children;
    for (let i = 0; i < maxRosterSize; i++) {
        if (selectedRoster[i]) {
            slots[i].innerText = `${i+1}. ${selectedRoster[i].name}`;
            slots[i].style.borderColor = "#ff9800";
            slots[i].style.borderStyle = "solid";
        }
    }
}

// 5. Simulator Engine Logic (Updates to process all 8 players)
function startSimulation() {
    document.getElementById("draft-section").style.display = "none";
    const resultsDiv = document.getElementById("results");
    resultsDiv.innerHTML = "";
    
    // Average ratings across all 8 players chosen
    let totalOff = selectedRoster.reduce((sum, p) => sum + p.off, 0) / maxRosterSize;
    let totalDef = selectedRoster.reduce((sum, p) => sum + p.def, 0) / maxRosterSize;
    let userPower = totalOff + totalDef; 

    let wins = 0;
    let losses = 0;
    const totalGames = 82;
    const baseOpponentPower = 172; // Baseline power difficulty threshold

    for (let i = 1; i <= totalGames; i++) {
        let userLuck = (Math.random() - 0.5) * 16; 
        let oppLuck = (Math.random() - 0.5) * 16;
        
        if ((userPower + userLuck) > (baseOpponentPower + oppLuck)) {
            wins++;
        } else {
            losses++;
        }
    }
    
    let performanceText = wins >= 74 ? "Incredible! Historic Run!" : wins >= 50 ? "Solid Playoff Team." : "Lottery Bound.";

    resultsDiv.innerHTML = `
        <h3>Final Record: <span class="win">${wins} - ${losses}</span></h3>
        <p><strong>Verdict:</strong> ${performanceText}</p>
        <p>Your Team Statistics -> Final Offense: ${totalOff.toFixed(1)} | Final Defense: ${totalDef.toFixed(1)}</p>
    `;
    
    document.getElementById("results-section").style.display = "block";
}

function resetGame() {
    document.getElementById("draft-section").style.display = "block";
    document.getElementById("results-section").style.display = "none";
    document.getElementById("sim-btn").disabled = true;
    selectedRoster = [];
    document.getElementById("count").innerText = "0";
    buildEmptySlots();
    nextRandomTeam();
}

// Window Startup initialization sequence
window.onload = () => {
    buildEmptySlots();
    nextRandomTeam();
};
</script>
</body>
</html>
